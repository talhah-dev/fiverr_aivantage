<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | AiVantage</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./docs/Style.css" />
</head>

<body class="bg-white text-slate-900" data-page="contact">
    <header class="bg-white pt-8 sm:pt-10 lg:pt-12">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col items-center">
                <a href="./index.html" class="block">
                    <img
                        src="./docs/assets/logo.avif"
                        alt="AiVantage logo"
                        class="w-full max-w-[23rem] object-contain sm:max-w-[30rem] lg:max-w-[48rem]" />
                </a>

                <nav class="mt-6 flex flex-wrap items-center justify-center gap-x-6 gap-y-3 pb-4 text-[1.35rem] font-normal text-[#275883] sm:mt-8 sm:text-[1.55rem]">
                    <a href="./index.html" class="transition hover:text-[#1b4466]">Home</a>
                    <a href="./services.html" class="transition hover:text-[#1b4466]">Services</a>
                    <a href="./about.html" class="transition hover:text-[#1b4466]">About</a>
                    <a href="./contact.html" class="transition hover:text-[#1b4466]">Contact</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="bg-white pt-16 sm:pt-20 lg:pt-24">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="mx-auto flex max-w-[48rem] flex-col items-center text-center text-[#275883]">
                    <h2 class="text-[2rem] font-light leading-[1.2] sm:text-[2.45rem] lg:text-[2.8rem]">
                        Subscribe for relevant AI updates
                    </h2>

                    <form class="mt-8 flex w-full max-w-[40rem] items-stretch border border-[#5b6580]">
                        <input
                            type="email"
                            placeholder="e.g., email@example.com"
                            class="min-w-0 flex-1 px-7 py-5 text-[1rem] font-light italic text-[#275883] placeholder:text-[#275883] focus:outline-none" />
                        <button
                            type="submit"
                            class="min-w-[5.7rem] bg-[#23537c] px-6 text-[1rem] font-light text-white transition hover:bg-[#1b4466]">
                            Join
                        </button>
                    </form>
                </div>

                <div class="mx-auto mt-24 flex max-w-[42rem] flex-col items-center text-center">
                    <img
                        src="./docs/assets/logo.avif"
                        alt="AiVantage logo"
                        class="w-full max-w-[41rem] object-contain" />

                    <p class="mt-12 text-[1.2rem] font-light text-[#275883]">
                        contact@aivantage.info
                    </p>

                    <p class="mt-10 pb-10 text-[1.05rem] font-light text-[#275883] sm:pb-12">
                        ©2024 by AiVantage.
                    </p>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
